# Nginx site serving the aptly-published apt repository tree.
# Install to /etc/nginx/sites-available/reposerver.conf and symlink into
# sites-enabled (install.sh does this). Adjust server_name for your host.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # aptly publishes signed repos under this directory.
    root /srv/aptly/data/public;

    # Allow clients to browse the tree (handy for debugging).
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # apt requests Release/Packages/.deb files; serve them directly.
    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/reposerver.access.log;
    error_log  /var/log/nginx/reposerver.error.log;
}
